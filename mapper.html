<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mapper Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
        }
        #visualization {
            width: calc(100vw - 250px);
            height: 100vh;
        }
        /* 🎛️ Control panel */
        #tool-panel {
            width: 250px;
            background: #f5f5f5;
            padding: 20px;
            border-left: 1px solid #ddd;
        }
        #mapper-svg {
            width: 100%;
            height: 100%;
        }
        .node {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 1.5px;
        }
        .node.selected {
            stroke: #ff0000;
            stroke-width: 3px;
        }
        /* 🤚 Grabby cursor for dragging nodes */
        .node:active {
            cursor: grabbing;
        }
        .link {
            stroke: #999;
            stroke-opacity: 0.6;
            stroke-linecap: round;  // Rounds the ends of the lines
        }
        .face {
            fill: #eee;
            fill-opacity: 0.2;
            stroke: none;
            mix-blend-mode: multiply;
        }
        /* 💬 Tooltip - node's personal information card */
        .tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            border-radius: 5px;
            pointer-events: none;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 1000;
        }
        .tool-button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }
        /* ✨ Hover effects for buttons */
        .tool-button:hover {
            background: #eee;
        }
        /* 🎯 Active button state */
        .tool-button.active {
            background: #ddd;
        }
    </style>
</head>
<body>
    <!-- 📊 Main visualization container -->
    <div id="visualization">
        <svg id="mapper-svg"></svg>
    </div><!-- Buttons -->
    <div id="tool-panel">
        <h3>Tools</h3>
        <button id="select-tool" class="tool-button">Select Mode</button>
        <p> When in this mode, click on nodes to select them.</p>
        <hr>
        <button id="pan-tool" class="tool-button active">Pan Mode</button>
        <p> When in this mode, you can interact with the simplicial complex.</p>
        <hr>
        <button id="cut-nodes" class="tool-button" disabled>Cut Selected Nodes</button>
        <p> Click this to cut the selected nodes from the simplicial complex</p>
        <hr>
        <button id="purge-nodes" class="tool-button" disabled>Purge Smaller Nodes</button>
        <p> Click this to cut the selected nodes and smaller.</p>
        <hr>
        <div id="selection-info">
            <p>Selected nodes: <span id="selected-count">0</span></p>
        </div>
        <div style="margin-top: 20px;">
            <button id="toggle-auto-refresh" class="tool-button active">Auto-Refresh: ON</button>
            <button id="center-view" class="tool-button">Center View</button>
        </div>
    </div>

        const container = document.getElementById('visualization');

        // Zoom to fit function
        function zoomToFit() {
            const bounds = g.node().getBBox();
            const fullWidth = width;
            const fullHeight = height;
            const padding = 80;

            const scale = 0.95 / Math.max(
                bounds.width / fullWidth,
                bounds.height / fullHeight
            );

            const transform = d3.zoomIdentity
                .translate(
                    fullWidth/2 - (bounds.x + bounds.width/2) * scale,
                    fullHeight/2 - (bounds.y + bounds.height/2) * scale
                )
                .scale(scale);

            svg.transition()
                .duration(750)
                .call(zoom.transform, transform);
        }

        const colorScale = d3.scaleLinear()
            .domain(d3.extent(mapper_data.nodes, d => d.color))

        // 🎪 physics simulation - where the magic happens
        const simulation = d3.forceSimulation(mapper_data.nodes)
            .force("link", d3.forceLink(mapper_data.links)
                .id(d => d.id)
                .distance(link => {
                    const sourceSize = Math.sqrt(link.source.size) * 2;
                    const targetSize = Math.sqrt(link.target.size) * 2;
                    return (sourceSize + targetSize) * 1.5; // 1.5x buffer for better spacing
                }))
            .force("charge", d3.forceManyBody()
                .strength(d => -150 * Math.sqrt(d.size))) // scale charge with size
            .force("center", d3.forceCenter(0, 0))
            .force("collide", d3.forceCollide()
                .radius(d => Math.sqrt(d.size) * 2.5) // Increased collision radius
                .strength(1)) // Maximum strength for collision
            .alphaDecay(0.0125);

        // Smooth transitions
        simulation.force("center")
            .strength(1);

        d3.transition()
            .duration(1500)
            .ease(d3.easeQuadOut) // Easing function
            .tween("centerStrength", () => {
                const i = d3.interpolate(1, 0.1);
                return t => {
                    simulation.force("center").strength(i(t));
                    simulation.alpha(0.3).restart();
                };
            });

        // Initial zoom to fit with animation
        setTimeout(() => {
            const bounds = g.node().getBBox();
            const scale = 0.95 / Math.max(
                bounds.width / width,
                bounds.height / height
            );

            const transform = d3.zoomIdentity
                .translate(
                    width/2 - (bounds.x + bounds.width/2) * scale,
                    height/2 - (bounds.y + bounds.height/2) * scale
                )
                .scale(scale);

            svg.transition()
                .duration(2000)
                .call(zoom.transform, transform);
        }, 1000);

        // 🔨 Create visual elements for the simplex
        let link = g.append("g")

            .data(mapper_data.links)
            .join("line")
            .attr("class", "link")
            .style("stroke-width", d => {
                // Calculate width based on connected nodes' sizes
                const sourceSize = Math.sqrt(d.source.size);
                const targetSize = Math.sqrt(d.target.size);
                // Use average of connected nodes' sizes for the link width
                return Math.max(1, Math.min(8, (sourceSize + targetSize) / 8));
            });

        // 🎮 Drag behavior setup
        const drag = d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended);

        function setupNodeEvents() {
            // clear existing event listeners
            node.on('.drag', null)
                .on('mouseover', null)
                .on('mouseout', null)
                .on('click', null);

            // apply new event listeners
            node.on("mouseover", function(event, d) {
                    tooltip.transition()
                        .duration(200)
                        .style("opacity", .9);
                    tooltip.html(d.tooltip)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 10) + "px");
                })
                .on("mouseout", function(d) {
                    tooltip.transition()
                        .duration(500)
                        .style("opacity", 0);
                })
                .on("click", function(event, d) {
                    if (currentMode === 'select') {
                        event.stopPropagation();
                        const nodeElement = d3.select(this);
                        if (selectedNodes.has(d.id)) {
                            selectedNodes.delete(d.id);
                            nodeElement.classed("selected", false);
                        } else {
                            selectedNodes.add(d.id);
                            nodeElement.classed("selected", true);
                        }
                        updateSelectionInfo();
                    }
                });

            // apply drag behavior based on current mode
            if (currentMode !== 'select') {
                node.call(drag);
            }
        }

        setupNodeEvents();

        document.getElementById('select-tool').addEventListener('click', () => setMode('select'));
        document.getElementById('pan-tool').addEventListener('click', () => setMode('pan'));
        document.getElementById('cut-nodes').addEventListener('click', cutSelectedNodes);
        document.getElementById('center-view').addEventListener('click', zoomToFit);
        document.getElementById('purge-nodes').addEventListener('click', purgeSmallerNodes);

        // auto-refresh toggle
        document.getElementById('toggle-auto-refresh').addEventListener('click', function() {
            autoRefreshEnabled = !autoRefreshEnabled;
            this.textContent = `Auto-Refresh: ${autoRefreshEnabled ? 'ON' : 'OFF'}`;
            this.classList.toggle('active');
        });

        function setMode(mode) {
            currentMode = mode;

            // remove active class from all buttons
            document.querySelectorAll('.tool-button').forEach(btn => btn.classList.remove('active'));

            if (mode === 'select') {
                // activate select mode
                document.getElementById('select-tool').classList.add('active');
                //svg.call(zoom.filter(() => false)); // disable zoom
                node.on('.drag', null); 
            } else {
                // activate pan mode
                document.getElementById('pan-tool').classList.add('active');
                svg.call(zoom.filter(() => true)); // Enable zoom
                node.call(drag); // Reapply drag behavior
            }
        }
        function updateSelectionInfo() {
            document.getElementById('selected-count').textContent = selectedNodes.size;
            document.getElementById('cut-nodes').disabled = selectedNodes.size === 0;
            document.getElementById('purge-nodes').disabled = selectedNodes.size === 0;
        }

        function cutSelectedNodes() {
            if (selectedNodes.size === 0) return;

            // filter out selected nodes and their connections
            mapper_data.nodes = mapper_data.nodes.filter(n => !selectedNodes.has(n.id));
            mapper_data.links = mapper_data.links.filter(l => 
                !selectedNodes.has(l.source.id) && !selectedNodes.has(l.target.id));
            mapper_data.faces = mapper_data.faces.filter(f => 
                !f.nodes.some(id => selectedNodes.has(id)));

            // update nodes with proper data binding
            node = g.selectAll(".node")
                .data(mapper_data.nodes, d => d.id);

            node.exit().remove();

            const nodeEnter = node.enter()
                .append("circle")
                .attr("class", "node")
                .attr("r", d => Math.sqrt(d.size) * 2)
                .style("fill", d => colorScale(d.color));

            node = nodeEnter.merge(node);

            // update links
            link = g.selectAll(".link")
                .data(mapper_data.links);

            link.exit().remove();

            const linkEnter = link.enter()
                .append("line")
                .attr("class", "link")
                .style("stroke-width", d => {
                    const sourceSize = Math.sqrt(d.source.size);
                    const targetSize = Math.sqrt(d.target.size);
                    return Math.max(1, Math.min(8, (sourceSize + targetSize) / 8));
                });

            link = linkEnter.merge(link);

            // update faces
            face = g.selectAll(".face")
                .data(mapper_data.faces);

            face.exit().remove();

            const faceEnter = face.enter()
                .append("polygon")
                .attr("class", "face")
                .style("fill", "#333")
                .style("fill-opacity", 0.2)
                .style("mix-blend-mode", "multiply");

            face = faceEnter.merge(face);

            // reset simulation with the remaining nodes
            simulation.nodes(mapper_data.nodes);
            simulation.force("link").links(mapper_data.links);
            simulation.alpha(0.3).restart();

            // reapply event listeners
            setupNodeEvents();

            // clear our node selections
            selectedNodes.clear();
            updateSelectionInfo();
        }

        function updateVisualization() {

                    simulation.nodes(mapper_data.nodes);

        function purgeSmallerNodes() {
            if (selectedNodes.size === 0) return;

            link

        function dragstarted(event, d) {
            if (currentMode !== 'select') {

                d.fx = event.x;
                d.fy = event.y;
            }
        }

        function dragged(event, d) {
            if (currentMode !== 'select') {
                d.fx = event.x;
                d.fy = event.y;
            }
        }

        function dragended(event, d) {
            if (currentMode !== 'select') {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;

                console.error('EventSource error:', e);
                source.close();
                setTimeout(setupEventSource, 1000);
            };
        }

        // initialize EventSource
        setupEventSource();

        // clear selection when clicking on empty space
        svg.on("click", () => {
            if (currentMode === 'select') {
                selectedNodes.clear();
                node.classed("selected", false);
                updateSelectionInfo();
            }
        });
    </script>
</body>
</html>
